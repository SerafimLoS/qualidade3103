<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html(~{::#content})}">
<head>
    <meta charset="UTF-8">
    <title th:text="${student.id != null ? 'Edit Student' : 'New Student'}">Student Form</title>
</head>
<body>
    <div id="content">
        <h2 th:text="${student.id != null ? 'Edit Student' : 'New Student'}">Student Form</h2>
        
        <form th:action="${student.id != null ? '/students/' + student.id : '/students'}" 
              th:object="${student}" 
              method="post">
            
            <div class="mb-3">
                <label for="name" class="form-label">Name</label>
                <input type="text" class="form-control" id="name" th:field="*{name}" required>
            </div>
            
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" th:field="*{email}" required>
            </div>
            
            <div class="mb-3">
                <label for="registrationNumber" class="form-label">Registration Number</label>
                <input type="text" class="form-control" id="registrationNumber" th:field="*{registrationNumber}" required>
            </div>
            
            <button type="submit" class="btn btn-primary" th:text="${student.id != null ? 'Update' : 'Save'}">Save</button>
            <a href="/students" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</body>
</html>
