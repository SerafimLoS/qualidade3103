<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html(~{::#content})}">
<head>
    <meta charset="UTF-8">
    <title>Students - Educational Quality Project</title>
</head>
<body>
    <div id="content">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Students</h2>
            <a href="/students/new" class="btn btn-primary">Add New Student</a>
        </div>
        
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Registration Number</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="student : ${students}">
                    <td th:text="${student.id}"></td>
                    <td th:text="${student.name}"></td>
                    <td th:text="${student.email}"></td>
                    <td th:text="${student.registrationNumber}"></td>
                    <td>
                        <a href="#" th:href="@{/students/{id}/edit(id=${student.id})}" class="btn btn-sm btn-outline-primary">Edit</a>
                        <a href="#" th:href="@{/students/{id}/delete(id=${student.id})}" 
                           class="btn btn-sm btn-outline-danger" 
                           onclick="return confirm('Are you sure you want to delete this student?')">Delete</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
