<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html(~{::#content})}">
<head>
    <meta charset="UTF-8">
    <title>Teachers - Educational Quality Project</title>
</head>
<body>
    <div id="content">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Teachers</h2>
            <a href="/teachers/new" class="btn btn-primary">Add New Teacher</a>
        </div>
        
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Department</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="teacher : ${teachers}">
                    <td th:text="${teacher.id}"></td>
                    <td th:text="${teacher.name}"></td>
                    <td th:text="${teacher.email}"></td>
                    <td th:text="${teacher.department}"></td>
                    <td>
                        <a href="#" th:href="@{/teachers/{id}/edit(id=${teacher.id})}" class="btn btn-sm btn-outline-primary">Edit</a>
                        <a href="#" th:href="@{/teachers/{id}/delete(id=${teacher.id})}" 
                           class="btn btn-sm btn-outline-danger" 
                           onclick="return confirm('Are you sure you want to delete this teacher?')">Delete</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
